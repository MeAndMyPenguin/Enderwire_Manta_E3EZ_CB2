[gcode_macro _CUSTOM_VARIABLES]
variable_material               : ""

variable_pla_offset             : -0.070
variable_pla_retraction         : 0.1
variable_pla_retraction_speed   : 20

variable_petg_offset            : -0.070
variable_petg_retraction        : 0.4
variable_petg_retraction_speed  : 30

variable_tpu_offset             : -0.020
variable_tpu_retraction         : 0.4
variable_tpu_retraction_speed   : 10

variable_abs_offset             : -0.070
variable_abs_retraction         : 0.1
variable_abs_retraction_speed   : 20

variable_asa_offset             : -0.070
variable_asa_retraction         : 0.3
variable_asa_retraction_speed   : 30

gcode:

[gcode_macro SET_MATERIAL]
gcode:
  {% set variables = printer["gcode_macro _CUSTOM_VARIABLES"] %}

  {% if variables.material == "PLA" %}
    M118 Filament material is {variables.material}. Setting Z-Offset to {variables.pla_offset}. Retraction amount to {variables.pla_retraction}. Retraction speed to {variables.pla_retraction_speed}
    SET_GCODE_OFFSET Z={variables.pla_offset}
    SET_RETRACTION RETRACT_LENGTH={variables.pla_retraction}
    SET_RETRACTION RETRACT_SPEED={variables.pla_retraction_speed}
    
  {% elif variables.material == "PETG" %}
    M118 Filament material is {variables.material}. Setting Z-Offset to {variables.petg_offset}. Retraction amount to {variables.petg_retraction}. Retraction speed to {variables.petg_retraction_speed}
    SET_GCODE_OFFSET Z={variables.petg_offset}
    SET_RETRACTION RETRACT_LENGTH={variables.petg_retraction}
    SET_RETRACTION RETRACT_SPEED={variables.petg_retraction_speed}
    
  {% elif variables.material == "TPU" %}
    M118 Filament material is {variables.material}. Setting Z-Offset to {variables.tpu_offset}. Retraction amount to {variables.tpu_retraction}. Retraction speed to {variables.tpu_retraction_speed}
    SET_GCODE_OFFSET Z={variables.tpu_offset}
    SET_RETRACTION RETRACT_LENGTH={variables.tpu_retraction}
    SET_RETRACTION RETRACT_SPEED={variables.tpu_retraction_speed}
    
  {% elif variables.material == "ABS" %}
    M118 Filament material is {variables.material}. Setting Z-Offset to {variables.abs_offset}. Retraction amount to {variables.abs_retraction}. Retraction speed to {variables.abs_retraction_speed}
    SET_GCODE_OFFSET Z={variables.abs_offset}
    SET_RETRACTION RETRACT_LENGTH={variables.abs_retraction}
    SET_RETRACTION RETRACT_SPEED={variables.abs_retraction_speed}
    
  {% elif variables.material == "ASA" %}
    M118 Filament material is {variables.material}. Setting Z-Offset to {variables.asa_offset}. Retraction amount to {variables.asa_retraction}. Retraction speed to {variables.asa_retraction_speed}
    SET_GCODE_OFFSET Z={variables.asa_offset}
    SET_RETRACTION RETRACT_LENGTH={variables.asa_retraction}
    SET_RETRACTION RETRACT_SPEED={variables.asa_retraction_speed}
    
  {% else %}
    M118 No material set
    
  {% endif %}